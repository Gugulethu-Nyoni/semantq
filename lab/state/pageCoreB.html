<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  </head>
  <body>
    <h1 id="header"></h1>

<script>

let name ="John";

let counter=0;

function increment() {
  counter++;
}

function decrement() {
  counter--;
}


</script>

<input type="text" data-bind="name" placeholder="Name" />

<h1> My name is <span data-bind="name">{name}</span></h1>

<h3> Counter: <span data-bind="counter"> 0 </span> </h3> <br/>

<input type="number" data-bind="counter" placeholder="Enter Number" />

Increment: <button onclick="increment()">+</button> &nbsp;
Decrement: <button onclick="decrement()">-</button>



    <script type="module">
      import StateOfState from './core.js';

    </script>
  </body>
</html>
