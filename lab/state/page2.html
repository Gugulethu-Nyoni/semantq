<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 2</title>
<!-- Link to globalState.js -->
<script type="module">
        import { GlobalState } from './globalState.js';

        // Initialize GlobalState instance in global scope
        window.globalState = new GlobalState();

        // Subscribe to changes in the global state
        globalState.subscribe('message', (message) => {
            console.log('Global state changed:', message);
        });
    </script>
</head>
<body>
<h1>Page 2</h1>
<button id="setButton">Set Global State</button>
<button id="getButton">Get Global State</button>
<script>
        // Function to set a value in the global state
        function setValue() {
            window.globalState.set('message', 'Hello from Page 2');
        }

        // Function to get a value from the global state
        function getValue() {
            const message = window.globalState.get('message');
            alert(message);
        }

        // Set event listeners for the buttons
        document.getElementById('setButton').addEventListener('click', setValue);
        document.getElementById('getButton').addEventListener('click', getValue);
    </script>
</body>
</html>
