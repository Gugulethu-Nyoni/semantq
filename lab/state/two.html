<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter Example Page 2</title>
</head>
<body>
<div id="count-display"></div>
<script>
    // Update count display
    function updateCountDisplay() {
      document.getElementById("count-display").innerText = localStorage.getItem("count") || 0;
    }

    // Initial render
    updateCountDisplay();

    // Listen for localStorage changes
    window.addEventListener('storage', updateCountDisplay);
  </script>
</body>
</html>
